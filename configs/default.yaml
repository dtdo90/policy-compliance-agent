  "synthetic": {
    "max_tries_per_prompt": 3,
    "sleep_between_calls_sec": 0.2,
    "min_words": 18,
    "max_words_soft": 90,
    "min_items_to_accept_batch": 10,
    "gen_max_new_tokens": 4096,
    "judge_max_new_tokens": 4096,
    "gen_temperature": 0.7,
    "gen_top_p": 0.9,
    "seed": 42,
    "trust_remote_code": true
