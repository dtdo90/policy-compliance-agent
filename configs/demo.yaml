{
  "runtime": {
    "cpu_threads": 4
  },
  "data": {
    "disclosures_file": "resources/demo_disclosures.json",
    "prompts_file": "data/prompts/demo_prompts.json",
    "synthetic_dataset_path": "data/results/demo/demo_synthetic_dataset.json",
    "eval_dataset_path": "data/results/demo/demo_eval_dataset.json",
    "sample_transcripts_path": "data/results/demo/sample_transcripts.json"
  },
  "models": {
    "sentence_transformer_base": "sentence-transformers/all-MiniLM-L6-v2",
    "cross_encoder_base": "cross-encoder/ms-marco-MiniLM-L12-v2",
    "sentence_transformer_output_dir": "models/demo/sentence-transformer",
    "cross_encoder_output_dir": "models/demo/cross-encoder",
    "bi_encoder_path": "models/demo/sentence-transformer",
    "cross_encoder_path": "models/demo/cross-encoder",
    "baseline_bi_encoder_path": "models/demo/baseline/sentence-transformer",
    "baseline_cross_encoder_path": "models/demo/baseline/cross-encoder"
  },
  "outputs": {
    "synthetic_output_path": "data/results/demo/demo_synthetic_dataset.json",
    "report_json_path": "data/results/demo/demo_report.json",
    "report_csv_path": "data/results/demo/demo_report.csv",
    "passed_cases_json_path": "data/results/demo/demo_passed_cases.json",
    "borderline_json_path": "data/results/demo/demo_borderline_cases.json",
    "annotation_json_path": "data/results/demo/demo_annotation_output.json",
    "approved_examples_json_path": "data/results/demo/approved_examples.json",
    "augmented_dataset_path": "data/results/demo/demo_augmented_dataset.json",
    "retriever_versions_dir": "models/demo/retriever_versions",
    "verifier_versions_dir": "models/demo/verifier_versions",
    "retriever_retrain_monitor_output_dir": "data/results/demo/checkpoints/st_retrain",
    "retrain_monitor_output_dir": "data/results/demo/checkpoints/ce_retrain"
  },
  "synthetic": {
    "backend": "external_api",
    "max_tries_per_prompt": 3,
    "sleep_between_calls_sec": 0.2,
    "min_words": 18,
    "max_words_soft": 90,
    "min_items_to_accept_batch": 10,
    "gen_temperature": 0.7,
    "gen_top_p": 0.9,
    "seed": 42,
    "external_api": {
      "base_url": "https://api.openai.com/v1",
      "api_key_env": "DEMO_LLM_API_KEY",
      "generation_model": "gpt-4.1",
      "judge_model": "gpt-4.1-mini",
      "response_format": "json_object",
      "timeout_sec": 120,
      "temperature": 0.7,
      "top_p": 0.9
    }
  },
  "training": {
    "max_length": 256,
    "learning_rate": 2e-5,
    "num_epochs": 1,
    "train_batch_size": 8,
    "eval_batch_size": 8,
    "warmup_ratio": 0.1,
    "logging_steps": 25,
    "dataloader_workers": 2,
    "force_cpu": true,
    "seed": 42,
    "confusion_neg_fraction": 0.0,
    "use_extra_sampling": false,
    "sentence_transformer_batch_size": 16,
    "sentence_transformer_eval_batch_size": 16,
    "triplet_margin": 0.5
  },
  "semantic_inference": {
    "include_rule_ids": [101, 102],
    "retrieval_top_k": 5,
    "verification_threshold": 0.5,
    "borderline_low": 0.3,
    "borderline_high": 0.7,
    "max_chunk_words": 20,
    "chunk_overlap": 15,
    "speaker_labels": ["Agent"],
    "annotation": false
  },
  "demo": {
    "ollama_url": "http://127.0.0.1:11434",
    "ollama_model": "qwen3:4b",
    "ollama_timeout_sec": 90,
    "ollama_think": false,
    "ollama_num_predict": 160,
    "min_approved_examples_for_retrain": 1,
    "require_both_labels_for_retrain": false
  },
  "agentic": {
    "incoming_source": "data/results/demo/sample_transcripts.json",
    "holdout_source": "data/results/demo/holdout_transcripts.json",
    "outputs_dir": "data/results/demo/agentic",
    "bootstrap_mode": "if_missing",
    "training_gate_metric": "macro_f1",
    "training_gate_threshold": 0.9,
    "training_gate_eval_size": 0.2,
    "training_gate_seed": 42,
    "review_categories": ["pass", "borderline", "fail"],
    "auto_approve_llm": true,
    "only_add_mispredictions": true,
    "promotion_metric": "macro_f1",
    "coverage_example_limit": 4,
    "coverage_similarity_threshold": 0.74,
    "augmentation_variants_per_gap": 2
  }
}
